# 정치 테마주 시즌 분석 타임라인
theme_stock_timeline:
  - phase: "선거 12~6개월 전"
    period: "2025-06 ~ 2025-12"
    pattern: "유력 후보 거론 → 테마주 1차 급등"
    signal: "매수 관심"

  - phase: "선거 6~3개월 전"
    period: "2025-12 ~ 2026-03"
    pattern: "경선/여론조사 결과 발표 → 테마주 2차 급등"
    signal: "강한 매수 시그널"

  - phase: "선거 3~1개월 전"
    period: "2026-03 ~ 2026-05"
    pattern: "공천 확정 → 최고 과열 구간"
    signal: "고점 주의, 분할 매도 고려"

  - phase: "선거 당일 전후"
    period: "2026-06-03 전후"
    pattern: "최고점 도달 후 급락 시작"
    signal: "매도 시그널"

  - phase: "선거 이후"
    period: "2026-06 ~"
    pattern: "당락 무관 대부분 급락 마무리"
    signal: "관망"

