name: PollStock 테마주 스크리닝

on:
  schedule:
    # 장중 3회 스크리닝 (KST → UTC, KST=UTC+9 고정, DST 없음)
    - cron: '0 1 * * 1-5'   # KST 10:00 - 장 시작 후
    - cron: '0 4 * * 1-5'   # KST 13:00 - 점심 후
    - cron: '40 6 * * 1-5'  # KST 15:40 - 장 마감 후 (메인)
  workflow_dispatch:  # 수동 실행 가능

jobs:
  screening:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install pykrx pandas numpy pyyaml requests beautifulsoup4 lxml setuptools google-genai feedparser python-dotenv

      - name: 한국 공휴일 확인 (휴장일 스킵)
        id: holiday-check
        run: |
          TODAY=$(TZ=Asia/Seoul date +'%Y-%m-%d')
          MMDD=$(TZ=Asia/Seoul date +'%m-%d')
          # 주요 공휴일 (음력 명절은 매년 변동 — 2026년 기준)
          HOLIDAYS="01-01 03-01 05-05 06-06 06-03 08-15 10-03 10-09 12-25"
          # 2026 설날(02-16~18), 추석(09-24~26) — 매년 수동 갱신 필요
          HOLIDAYS="$HOLIDAYS 02-16 02-17 02-18 09-24 09-25 09-26"
          IS_HOLIDAY="false"
          for H in $HOLIDAYS; do
            if [ "$MMDD" = "$H" ]; then
              IS_HOLIDAY="true"
              break
            fi
          done
          echo "is_holiday=$IS_HOLIDAY" >> $GITHUB_OUTPUT
          echo "today=$TODAY" >> $GITHUB_OUTPUT
          if [ "$IS_HOLIDAY" = "true" ]; then
            echo "📅 $TODAY 공휴일 — 스크리닝 스킵"
          fi

      - name: 스크리닝 실행
        if: steps.holiday-check.outputs.is_holiday != 'true'
        id: screening
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
        run: python scripts/run_screening.py

      - name: 결과 커밋 (GitHub Pages 갱신)
        if: steps.holiday-check.outputs.is_holiday != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/ data/gemini_cache/ data/suggestions/ data/assets/ data/polls/
          git diff --staged --quiet || git commit -m "chore: PollStock 스크리닝 $(date -u +'%Y-%m-%d %H:%M')"
          git push

      - name: 실패 시 GitHub Issue 생성
        if: failure() && steps.holiday-check.outputs.is_holiday != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const today = '${{ steps.holiday-check.outputs.today }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[자동] 스크리닝 실패 — ${today}`,
              body: `## 스크리닝 워크플로우 실패\n\n- **날짜:** ${today}\n- **실행 로그:** ${runUrl}\n- **트리거:** ${context.eventName}\n\n자동 생성된 이슈입니다. 로그를 확인해주세요.`,
              labels: ['bug', 'automated']
            });
