name: 정치 테마주 일일 스크리닝

on:
  schedule:
    # 평일 장 마감 후 (KST 15:40 = UTC 06:40)
    - cron: '40 6 * * 1-5'
    # 평일 장 시작 전 (KST 08:50 = UTC 23:50 전일)
    - cron: '50 23 * * 0-4'
  workflow_dispatch:  # 수동 실행 가능

jobs:
  screening:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 결과 파일 커밋용

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install pykrx pandas pyyaml requests beautifulsoup4 lxml setuptools

      - name: 스크리닝 실행
        run: python scripts/run_screening.py
        env:
          PYTHONPATH: src

      - name: 결과 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/
          git diff --staged --quiet || git commit -m "chore: 자동 스크리닝 결과 업데이트 ($(date +'%Y-%m-%d %H:%M KST'))"
          git push
