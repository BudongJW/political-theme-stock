name: PollStock 테마주 스크리닝

on:
  schedule:
    # 장중 3회 스크리닝 (KST → UTC)
    - cron: '0 1 * * 1-5'   # KST 10:00 - 장 시작 후
    - cron: '0 4 * * 1-5'   # KST 13:00 - 점심 후
    - cron: '40 6 * * 1-5'  # KST 15:40 - 장 마감 후 (메인)
  workflow_dispatch:  # 수동 실행 가능

jobs:
  screening:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install pykrx pandas numpy pyyaml requests beautifulsoup4 lxml setuptools google-genai feedparser python-dotenv

      - name: 스크리닝 실행
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
        run: python scripts/run_screening.py

      - name: 결과 커밋 (GitHub Pages 갱신)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/ data/gemini_cache/ data/suggestions/ data/assets/ data/polls/
          git diff --staged --quiet || git commit -m "chore: PollStock 스크리닝 $(date -u +'%Y-%m-%d %H:%M')"
          git push
